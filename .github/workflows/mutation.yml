name: Mutation

on:
  push:
    branches: [main]
    paths:
      - 'src/core/**'
      - 'stryker.config.json'
      - 'vitest.mutation.config.ts'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/core/**'
      - 'stryker.config.json'
      - 'vitest.mutation.config.ts'
      - 'package-lock.json'

jobs:
  mutation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run core mutation tests
        run: npm run test:mutation:ci
        timeout-minutes: 90

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7
